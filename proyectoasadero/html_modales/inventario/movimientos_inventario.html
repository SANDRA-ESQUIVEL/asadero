<div id="modalMovimientosInventario" class="modal-principal">
  <div class="modalMovimiento-content">

    <span class="close" onclick="cerrarModal('modalMovimientosInventario')">&times;</span>
    
    <h3>The Broaster House - Tabla de Inventario</h3>

      <div  class="casilla_fecha">
        <label>Fecha:</label>
        <input type="text" class= "campo-fecha" name="fecha" readonly><br><br>
      </div>

    <!-- BUSCADOR -->
    <input type="text" id="buscarInventario" placeholder="Buscar producto...">

    <!-- TABLA -->
    <table id="tablaInventario">
      <thead>
        <tr>
          <th>ID</th>
          <th>ID Mov</th>
          <th>Nombre</th>
          <th>Categoría</th>
          <th>Tipo</th>
          <th>Unidad</th>
          <th>Stock Inicial</th>
          <th>Entradas</th>
          <th>Fecha Entrada</th>
          <th>Salidas</th>
          <th>Fecha Salida</th>
          <th>Total</th>
          <th>Stock Min</th>
          <th>Fecha Vencimiento</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody id="bodyInventario">
        <!-- Se llena con JS -->
      </tbody>
    </table>

  </div>
</div>

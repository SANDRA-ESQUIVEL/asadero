<div id="modalSalidaInventario" class="modal-secundario">
  <div class="modalMovimiento-content">

    <span class="close" onclick="cerrarModal('modalSalidaInventario')">&times;</span>

    <h3>➖ Salida de Inventario</h3>

    <div class="casilla_fecha">
      <label>Fecha:</label>
      <input type="text" class="campo-fecha" id="fechaSalida" step="1" readonly>
    </div>

    <form id="formSalidaInventario">

    <div>

      <div>
        <label>ID Salida:</label>
        <input type="text" id="codigoSalida" readonly>
      </div>

      <div>
        <label>Producto:</label>
        <input type="text" id="productoSalida" readonly>
      </div>

      <div>
        <label>Cantidad a retirar:</label>
        <input type="number" id="cantidadSalida" required>
      </div>

      <div>
        <label>Precio de venta:</label>
        <input type="number" id="precioSalida" placeholder="Ej: 15000" required>
      </div>

      <div class="botones_final">
        <button type="submit" class="btn-registrar">Guardar</button>
        <button type="button" class="btn-cancelar" onclick="cerrarModal('modalSalidaInventario')">Cancelar</button>
      </div>

    </div> 

    </form>

  </div>
</div>

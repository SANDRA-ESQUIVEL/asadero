<div id="modalEntradaInventario" class="modal-secundario">
  <div class="modalMovimiento-content">

    <span class="close" onclick="cerrarModal('modalEntradaInventario')">&times;</span>

    <h3>➕ Entrada de Inventario</h3>

    <div class="casilla_fecha">
      <label>Fecha:</label>
      <input type= "text" class="campo-fecha" id="fechaIngreso" step="1" readonly>
    </div>

    <form id="formEntradaInventario">

      <div>

        <div>
          <label>ID Entrada:</label>
          <input type="text" id="codigoEntrada" readonly>
        </div>

        <div>
          <label>Producto:</label>
          <input type="text" id="productoEntrada" readonly>
        </div>

        <div>
          <label>Cantidad a ingresar:</label>
          <input type="number" id="cantidadEntrada" required>
        </div>

        <div>
          <label>Fecha de Vencimiento:</label>
          <input type="date" id="fechaVencimiento" required>
        </div>

        <div>
          <label>Precio de compra:</label>
          <input type="number" id="precioEntrada" placeholder="Ej: 8500" required>
        </div>

        <div class="botones_final">
          <button type="submit" class="btn-registrar">Guardar</button>
          <button type="button" class="btn-cancelar" onclick="cerrarModal('modalEntradaInventario')">Cancelar</button>
        </div>

      </div>

    </form>

  </div>
</div>

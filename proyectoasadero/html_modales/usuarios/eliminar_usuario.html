<div id="modalEliminar" class="modalEliminar">
  <div class="modalEliminar-content">
    <span class="close" onclick="cancelarProceso('modalEliminar')">&times;</span>
    <h2>Selecciona el usuario que desea Eliminar</h2>

    <div  class="casilla_fecha">
                <label>Fecha:</label>
                <input type="text" class= "campo-fecha" name="fecha" readonly><br><br>
            </div>
    
    <div class="usuarios-lista" id="usuariosListaEliminar">
      <div class="usuario-eliminar" data-usuario="Administrador"onclick="eliminarUsuario(this)">ADMINISTRADORA<br>Pepita Perez</div>
      <div class="usuario-eliminar" data-usuario="Vendedor001" onclick="eliminarUsuario(this)">VENDEDORA UNO<br>Cata Sanchez</div>
      <div class="usuario-eliminar" data-usuario="Vendedor002" onclick="eliminarUsuario(this)">VENDEDORA DOS<br>Juanita Diaz</div>
    </div>

    <div class="botones_final">
      <button type="button" id="btnEliminarPaso1" class="btn-eliminar">Eliminar</button>
      <button type="button" class="btn-cancelar" onclick="cancelarProceso('modalEliminar')">Cancelar</button>
    </div>
  </div>
</div>

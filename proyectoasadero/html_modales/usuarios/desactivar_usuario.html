<div id="modalDesactivar" class="modalDesactivar">
  <div class="modalDesactivar-content">
    <span class="close" onclick="cancelarProceso('modalDesactivar')">&times;</span>
    <h2>Selecciona el usuario que desea Desactivar</h2>
    
    <div class="usuarios-lista" id="usuariosListaDesactivar">
      <div class="usuario-desactivar" data-usuario="Administrador" onclick="desactivarUsuario(this)">ADMINISTRADORA<br>Pepita Perez<br><span class="estado activo">ACTIVO</span></div>
      <div class="usuario-desactivar" data-usuario="Vendedor001 onclick="desactivarUsuario(this)">VENDEDORA UNO<br>Cata Sanchez<br><span class="estado activo">ACTIVO</span></div>
      <div class="usuario-desactivar" data-usuario="Vendedor002" onclick="desactivarUsuario(this)">VENDEDORA DOS<br>Juanita Diaz<br><span class="estado activo">ACTIVO</span></div>
    </div>

    <div class="botones_final">
      <button type="button" id="btnDesactivarPaso1" class="btn-desactivar">Desactivar</button>
      <button type="button" class="btn-cancelar" onclick="cancelarProceso('modalDesactivar')">Cancelar</button>
    </div>
  </div>
</div>
  
<div id="modalDesactivar1" class="modalDesactivar">
    <div class="modalDesactivar-content">
        <span class="close" onclick="cancelarProceso('modalDesactivar1')">&times;</span>

        <h2>Desactivar Usuario</h2>

        <form id="seleccionarCampos1"> 

            <div  class="casilla_fecha">
                <label>Fecha:</label>
                <input type="text" class= "campo-fecha" name="fecha" readonly><br><br>
            </div>

            <!-- Aquí hacemos el contenedor que tendrá todo en dos columnas -->
            <div class="contenedor-campos">

                <div class="columna-fechas">
                    <div class="fecha-inicio">
                        <label for="fechaInicio">Fecha de Inicio de desactivación:</label>
                        <input type="date" id="fechaInicio" name="fechaInicio" required>
                    </div>

                    <div class="fecha-final">
                        <label for="fechaFin">Fecha Finalización de desactivación:</label>
                        <input type="date" id="fechaFin" name="fechaFin" required>
                    </div>
                </div>

                <div class="campo-desactivar">
                    <label for="motivoDesactivacion">Motivo de desactivación:</label>
                    <select id="motivoDesactivacion" name="motivoDesactivacion">
                        <option value=""disabled selected >Motivo de desactivación</option>
                        <option value="Vacaciones">Vacaciones</option>
                        <option value="SolicitudPermiso">Solicitud de Permiso</option>
                        <option value="Incapacidad">Incapacidad</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>

            </div>

            <div class="botones_final">
                <button type="submit" class="btn-desactivar">Desactivar</button>
                <button type="button" class="btn-cancelar" onclick="cancelarProceso('modalDesactivar1')">Cancelar</button>
            </div>

        </form>
    </div>  
</div>

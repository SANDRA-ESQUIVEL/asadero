# ============================================
# PARA POSTGRESQL (Render/producción):
# ============================================
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/asadero}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}